name: Task
description: Create a new task to be picked up and tracked on the project board
labels: ["task"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What needs to be done? Include relevant context.
      placeholder: Describe the task clearly enough that someone unfamiliar with it can pick it up.
    validations:
      required: true

  - type: checkboxes
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: All of the following must be checked for this task to be considered done.
      options:
        - label: Functionality works as described and matches requirements
          required: true
        - label: Code has been tested locally
          required: true
        - label: No regressions introduced in existing features
          required: true
        - label: Documentation updated (if applicable)
          required: true
        - label: Reviewed and approved by an assigned reviewer
          required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How urgent is this task?
      options:
        - Low
        - Medium
        - High
        - Critical
    validations:
      required: true

  - type: dropdown
    id: difficulty
    attributes:
      label: Difficulty
      description: How complex is this task expected to be?
      options:
        - Easy
        - Medium
        - Hard
        - Very Hard
    validations:
      required: true

  - type: input
    id: deadline
    attributes:
      label: Deadline
      description: When does this need to be completed by? (format YYYY-MM-DD)
      placeholder: "2026-07-31"
    validations:
      required: true

  - type: input
    id: branch
    attributes:
      label: Suggested branch name
      description: A suggested name for the branch this work should happen on (e.g. feature/issue-xxx-short-desc)
      placeholder: feature/issue-xxx-short-desc
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---
        Once created, this issue should be added to the [project board](https://github.com/orgs/Cerify-Systems/projects/3) and assigned before work begins. See [CONTRIBUTING.md](https://github.com/Cerify-Systems/.github/blob/main/CONTRIBUTING.md) for the full workflow.
        
